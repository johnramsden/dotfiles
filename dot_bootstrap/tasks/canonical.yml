---
# Canonical (Ubuntu) specific tasks

# ==================== VARS ====================
- name: Load Ubuntu base vars
  include_vars: "{{ playbook_dir }}/vars/ubuntu_base.yml"

- name: Load host-specific vars
  include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ playbook_dir }}/vars/hosts/{{ ansible_hostname }}.yml"
        - "{{ playbook_dir }}/vars/hosts/default.yml"

- name: Combine base and host package lists
  set_fact:
    all_external_repos: "{{ base_external_repos | default([]) + extra_external_repos | default([]) }}"
    all_external_debs: "{{ base_external_debs | default([]) + extra_external_debs | default([]) }}"
    all_snap_packages: "{{ base_snap_packages | default([]) + extra_snap_packages | default([]) }}"

# ==================== BASE PACKAGES ====================
- name: Install base packages (Ubuntu/Debian)
  become: true
  apt:
    name: "{{ ubuntu_base_packages }}"
    state: present
    update_cache: true

# ==================== HOST-SPECIFIC PACKAGES ====================
- name: Install host-specific apt packages
  become: true
  apt:
    name: "{{ extra_apt_packages }}"
    state: present
  when: extra_apt_packages | default([]) | length > 0

# ==================== DIRECTORIES ====================
- name: Create Canonical workspace directory
  file:
    path: "{{ ansible_env.HOME }}/Canonical"
    state: directory
    mode: '0755'
  when: is_can | bool

# ==================== EXTERNAL REPOSITORIES ====================
- name: Setup external APT repositories
  include_tasks: "{{ playbook_dir }}/tasks/external_repos.yml"
  when: all_external_repos | length > 0 or all_external_debs | length > 0

# ==================== SNAP PACKAGES ====================
- name: Install snap packages
  include_tasks: "{{ playbook_dir }}/tasks/snap_packages.yml"
  when: all_snap_packages | length > 0

# ==================== SYSTEMD USER SERVICES ====================
- name: Enable and start ssh-agent service
  systemd:
    name: ssh-agent.service
    enabled: true
    state: started
    scope: user
