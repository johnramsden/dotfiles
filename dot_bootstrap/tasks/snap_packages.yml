---
# Tasks for installing snap packages.
# Requires: all_snap_packages (merged in canonical.yml)

- name: Ensure snapd is installed
  become: true
  apt:
    name: snapd
    state: present

- name: Install snap packages
  become: true
  community.general.snap:
    name: "{{ item.name }}"
    classic: "{{ item.classic | default(false) }}"
    channel: "{{ item.channel | default(omit) }}"
    state: present
  loop: "{{ all_snap_packages }}"
  loop_control:
    label: "{{ item.name }}"
